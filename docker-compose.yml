services:
  alita-agent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - alita_agent/.env
    environment:
      ECOMMERCE_API_URL: http://ecommerce-api:8080
      FRONTEND_ORIGIN: http://localhost:4200
      OTEL_SERVICE_NAME: alita-agent
      JAEGER_ENDPOINT: http://jaeger:4317
      LOKI_URL: http://loki:3100
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    external: true
    name: ecommerce-network
